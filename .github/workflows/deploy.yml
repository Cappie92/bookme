name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Install sshpass
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass
        
    - name: Add known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to server
      run: |
        sshpass -p '${{ secrets.SERVER_PASSWORD }}' ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          # Same logic as scripts/prod/compose.sh (not sourced here: scp has not run yet)
          compose_run() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            elif docker-compose version >/dev/null 2>&1; then
              docker-compose "$@"
            else
              echo "ERROR: need 'docker compose' (Compose v2 plugin) or 'docker-compose' (v1) in PATH." >&2
              return 1
            fi
          }
          # Create project directory
          mkdir -p /opt/dedato
          cd /opt/dedato
          
          # Stop existing containers
          compose_run -f docker-compose.prod.yml down || true
          
          # Clean up old images (do NOT prune volumes: prod data lives in volumes)
          docker image prune -f || true
        EOF
        
        # Copy files to server
        sshpass -p '${{ secrets.SERVER_PASSWORD }}' scp -r . ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/dedato/
        
        # Deploy on server
        sshpass -p '${{ secrets.SERVER_PASSWORD }}' ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          set -euo pipefail
          cd /opt/dedato
          
          # deploy/prod/backend.env не в git (.gitignore); на сервере должен существовать заранее
          if [ ! -f deploy/prod/backend.env ]; then
            echo "ERROR: missing deploy/prod/backend.env on server (copy from deploy/prod/backend.env.example)."
            exit 1
          fi
          
          source ./scripts/prod/compose.sh
          if ! compose_run version >/dev/null 2>&1; then
            echo "ERROR: need 'docker compose' (Compose v2 plugin) or 'docker-compose' (v1) in PATH."
            exit 1
          fi
          
          # Build and start containers
          compose_run -f docker-compose.prod.yml build
          compose_run -f docker-compose.prod.yml up -d
          
          # Alembic → тот же SQLite volume, что у backend (см. scripts/prod/migrate.sh)
          bash ./scripts/prod/migrate.sh
          
          # Clean up
          docker image prune -f
          
          echo "Deployment completed!"
        EOF
        
    - name: Health check
      run: |
        sleep 30
        curl -f http://${{ secrets.SERVER_HOST }}/health || exit 1 