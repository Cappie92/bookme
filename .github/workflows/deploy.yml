name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Один активный деплой на ref: параллельные push не должны перезаписывать друг друга
    # (миграции, health).
    concurrency:
      group: deploy-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Install deploy tools
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass rsync
        
    - name: Add known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to server
      run: |
        sshpass -p '${{ secrets.SERVER_PASSWORD }}' ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          mkdir -p /opt/dedato
        EOF

        export RSYNC_RSH="sshpass -p '${{ secrets.SERVER_PASSWORD }}' ssh -o StrictHostKeyChecking=yes"

        rsync -az --info=progress2           --exclude '.git'           --exclude '.github'           --exclude '.cursor'           --exclude '.vscode'           --exclude '.idea'           --exclude 'docs'           --exclude 'frontend/node_modules'           --exclude 'frontend/dist'           --exclude 'backend/.venv'           --exclude 'backend/venv'           --exclude '**/__pycache__'           --exclude '**/.pytest_cache'           --exclude '**/.mypy_cache'           --exclude '**/.ruff_cache'           --exclude '**/node_modules'           --exclude '**/dist'           --exclude '**/*.log'           ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/dedato/

        # Deploy on server
        sshpass -p '${{ secrets.SERVER_PASSWORD }}' ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          set -euo pipefail
          cd /opt/dedato
          
          # deploy/prod/backend.env не в git (.gitignore); на сервере должен существовать заранее
          if [ ! -f deploy/prod/backend.env ]; then
            echo "ERROR: missing deploy/prod/backend.env on server (copy from deploy/prod/backend.env.example)."
            exit 1
          fi
          
          source ./scripts/prod/compose.sh
          if ! compose_run version >/dev/null 2>&1; then
            echo "ERROR: need 'docker compose' (Compose v2 plugin) or 'docker-compose' (v1) in PATH."
            exit 1
          fi

          # BuildKit disabled: prod host may lack working docker buildx; classic builder is reliable.

          # Build app images (redis is pull-only)
          compose_run -f docker-compose.prod.yml build backend frontend

          # docker-compose v1.x (e.g. 1.29.2) can throw ContainerConfig on "recreate"; stop+rm only
          # backend/frontend so `up` creates fresh containers. Redis/network/volumes unchanged; no full down.
          compose_run -f docker-compose.prod.yml rm -sf backend frontend || true

          compose_run -f docker-compose.prod.yml up -d --remove-orphans
          
          # Alembic → тот же SQLite volume, что у backend (см. scripts/prod/migrate.sh)
          bash ./scripts/prod/migrate.sh
          
          echo "Deployment completed!"
        EOF
        
    - name: Health check
      run: |
        sleep 30
        curl -f http://${{ secrets.SERVER_HOST }}/health || exit 1 