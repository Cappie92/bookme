version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      # На сервере создайте файл из шаблона deploy/prod/backend.env.example
      - ./deploy/prod/backend.env
    environment:
      # DB и артефакты — в volumes, не в директории репозитория.
      - DATABASE_URL=sqlite:////data/bookme.db
      # Redis нужен для OTP-хранилища (см. backend/sms.py). В контейнере localhost = сам backend.
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - dedato_data:/data
      - dedato_uploads:/app/uploads
      - dedato_logs:/app/logs
    depends_on:
      - redis

  frontend:
    build:
      # Repo root: vite/tailwind resolve `shared` to ../shared → need shared/ in image (see frontend/Dockerfile.prod)
      context: .
      dockerfile: frontend/Dockerfile.prod
    restart: unless-stopped
    ports:
      # Только loopback: хостовый nginx уже слушает :80/:443 и проксирует сюда (например 127.0.0.1:8080 → контейнер :80).
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

networks:
  default:
    name: dedato_network

volumes:
  dedato_data:
    name: dedato_data
  dedato_uploads:
    name: dedato_uploads
  dedato_logs:
    name: dedato_logs