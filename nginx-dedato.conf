# Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name dedato.ru www.dedato.ru 193.160.208.206;
    
    # Редирект на HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS сервер
server {
    listen 443 ssl http2;
    server_name dedato.ru www.dedato.ru 193.160.208.206;

    # SSL сертификаты
    ssl_certificate /etc/ssl/certs/dedato.ru.crt;
    ssl_certificate_key /etc/ssl/private/dedato.ru.key;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Universal Links (iOS) и App Links (Android). Файлы: см. deploy/well-known/README.md
    # Скопируйте готовые артефакты в каталог на сервере (пример пути ниже).
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        charset utf-8;
        alias /var/www/dedato-well-known/apple-app-site-association;
    }
    location = /.well-known/assetlinks.json {
        default_type application/json;
        charset utf-8;
        alias /var/www/dedato-well-known/assetlinks.json;
    }

    # Frontend (React app)
    location / {
        proxy_pass http://localhost:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Загруженные файлы (фото мастера и т.д.) — только backend отдаёт /uploads
    location /uploads/ {
        proxy_pass http://localhost:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
